# Local compose used for building/pushing the image. The server runs its own
# compose in /opt/mafia-bot referencing the same private image :latest tag.
# This is a long-polling Telegram bot: it has no inbound HTTP port.
services:
  mafia-bot:
    image: eduard256/mafia-bot:latest
    container_name: mafia-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # Persist events.json / users.json across container recreation.
      - ./data:/app/data
